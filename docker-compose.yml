version: '3.8'

services:
  backend:
    build:
      context: ./login_backend
    container_name: login_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:testdb
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=password
    networks:
      - app-network

  frontend:
    build:
      context: ./login_frontend/my-app
    container_name: login_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridgenpm 